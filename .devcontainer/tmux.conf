# Prefix: Ctrl+a (screen-like)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Start window numbering at 0 (default, explicit)
set -g base-index 0
setw -g pane-base-index 0

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Status bar
set -g status-style 'bg=#333333 fg=#aaaaaa'
set -g status-left '#[fg=#ffffff,bold] [#{session_name}] '
set -g status-left-length 20
set -g status-right '#[fg=#888888] %H:%M '
setw -g window-status-current-style 'fg=#ffffff,bold,bg=#555555'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# Easy window navigation
bind -n M-Left previous-window
bind -n M-Right next-window

# Reload config with prefix+r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Better split bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
